name: CI/CD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-typecheck
    env:
      NEXT_PUBLIC_SITE_URL: ${{ vars.SITE_URL }}
      NEXT_PUBLIC_SITE_NAME: 'Cloud & DevOps Knowledge Base'
      NEXT_PUBLIC_GITHUB_REPO: ${{ vars.GITHUB_REPO }}
      NEXT_PUBLIC_PLAUSIBLE_DOMAIN: ${{ vars.PLAUSIBLE_DOMAIN }}
      NEXT_PUBLIC_UMAMI_ID: ${{ vars.UMAMI_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Verify sitemap
        run: test -f .next/server/app/sitemap.xml/route.js && echo "✅ Sitemap OK"
